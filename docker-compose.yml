version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: error-translator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: error-translator-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: error-translator-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: error-translator-backend:local
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    # The backend Dockerfile already defines a HEALTHCHECK on /health
    # so docker-compose will be able to track service health.
    restart: unless-stopped
  
  frontend:
    container_name: error-translator-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser runs outside Docker, so localhost:8000 is correct here.
        VITE_API_BASE_URL: "http://localhost:8000"
    image: error-translator-frontend:local
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped
volumes:
  postgres_data: