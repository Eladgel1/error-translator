name: Frontend E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-e2e-tests:
    name: Frontend E2E against real backend (main only)
    runs-on: ubuntu-latest
    
    env:
      # Frontend development server will call the backend on localhost:8000 during E2E flows  
      VITE_API_BASE_URL: "http://localhost:8000" 
      
      # Backend minimal env so the backend container can start for E2E tests
      APP_NAME: "Error Translator API (E2E)"
      ENVIRONMENT: "test"
      DEBUG: "false"
      AI_PROVIDER: "gemini"
      AI_MODEL: "gemini-2.5-flash"
      AI_BASE_URL: "https://generativelanguage.googleapis.com/v1beta/models"
      AI_REQUEST_TIMEOUT_SECONDS: "30"
      AI_MAX_RETRIES: "2"
    
    defaults:
      run:
        working-directory: frontend
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      # Start backend for E2E
      - name: Build backend Docker image (for E2E)
        working-directory: .
        run: |
          docker build -t error-translator-backend:e2e -f backend/Dockerfile backend

      - name: Run backend container (for E2E)
        working-directory: .
        run: |
          docker run -d --rm --name error-translator-backend-e2e -p 8000:8000 \
            -e APP_NAME="${APP_NAME}" \
            -e ENVIRONMENT="${ENVIRONMENT}" \
            -e DEBUG="${DEBUG}" \
            -e AI_PROVIDER="${AI_PROVIDER}" \
            -e AI_MODEL="${AI_MODEL}" \
            -e AI_BASE_URL="${AI_BASE_URL}" \
            -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            -e AI_REQUEST_TIMEOUT_SECONDS="${AI_REQUEST_TIMEOUT_SECONDS}" \
            -e AI_MAX_RETRIES="${AI_MAX_RETRIES}" \
            error-translator-backend:e2e

      - name: Wait for backend health
        working-directory: .
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 2
          done
          echo "Backend did not become healthy in time"
          docker logs error-translator-backend-e2e || true
          exit 1

      # Frontend setup + E2E
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
          
      - name: Install dependencies
        run: |
          npm ci

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps

      - name: Run tests (E2E)
        run: |
          npm run test:e2e

      # Always stop backend (even if tests fail)
      - name: Stop backend container
        if: always()
        working-directory: .
        run: |
          docker stop error-translator-backend-e2e || true
         