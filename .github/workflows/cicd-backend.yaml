name: Backend CI/CD

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  backend-cicd:
    name: Backend tests, lint and Docker build
    runs-on: ubuntu-latest

    # Job-wide environment variables
    env:
      APP_NAME: "Error Translator API (CICD)"
      ENVIRONMENT: "test"
      DEBUG: "false"
      AI_PROVIDER: "gemini"
      AI_MODEL: "gemini-2.5-flash"
      AI_BASE_URL: "https://generativelanguage.googleapis.com/v1beta/models"
      GEMINI_API_KEY: "dummy-ci-key"
      AI_REQUEST_TIMEOUT_SECONDS: "15"
      AI_MAX_RETRIES: "2"

    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"    
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run ruff (linter)
        run: |
          ruff check app tests
          
      - name: Run pytest
        run: |
          pytest

      - name: Build backend Docker image
        working-directory: .
        run: |
          docker build -t error-translator-backend:ci -f backend/Dockerfile backend

      - name: Save image as tar
        working-directory: .
        run: |
          docker save error-translator-backend:ci -o error-translator-backend-ci.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: error-translator-backend-ci-image
          path: error-translator-backend-ci.tar
          if-no-files-found: error  

      - name: Trigger Vercel deploy (Backend)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/main')
        run: |
          curl -fsS -X POST "$VERCEL_BACKEND_DEPLOY_HOOK"
        env:
          VERCEL_BACKEND_DEPLOY_HOOK: ${{ secrets.VERCEL_BACKEND_DEPLOY_HOOK }}  
              