name: Frontend CI/CD

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  frontend-ci:
    name: Frontend lint, tests, build, and Docker image
    runs-on: ubuntu-latest

    # Job-wide env so Vite has a valid API base URL during the build
    env:
      VITE_API_BASE_URL: "http://localhost:8000"

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: |
          npm ci

      - name: Run ESLint
        run: |
          npm run lint

      - name: Run tests (unit)
        run: |
          npm run test:unit

      - name: Build frontend (Vite)
        run: |
          npm run build

      # Build Docker image
      - name: Build frontend Docker image
        working-directory: .
        run: |
          docker build -t error-translator-frontend:ci \
            --build-arg VITE_API_BASE_URL=http://localhost:8000 \
            -f frontend/Dockerfile \
            frontend

      - name: Save image as tar
        working-directory: .
        run: |
          docker save error-translator-frontend:ci -o error-translator-frontend-ci.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: error-translator-frontend-ci-image
          path: error-translator-frontend-ci.tar
          if-no-files-found: error
